services:
  notes:
    build: .
    container_name: notes-app
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - notes-data:/data
    environment:
      - DB_PATH=/data/notes.db
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/notes')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  notes-data:
    driver: local
