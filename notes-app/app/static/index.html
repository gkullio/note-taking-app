<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;0,6..72,500;1,6..72,300;1,6..72,400&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/style.css" />
</head>
<body>

<!-- TOPBAR -->
<div id="topbar">
  <div class="logo">note<span>s</span></div>
  <button id="btn-home" title="Companies">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
      <polyline points="9 22 9 12 15 12 15 22"/>
    </svg>
  </button>
  <div id="search-wrap">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>
    <input id="search" type="text" placeholder="Search notes…" autocomplete="off" />
    <div id="search-dropdown"></div>
  </div>
  <button id="btn-new">+ New Note</button>
</div>

<!-- MAIN -->
<div id="main">

  <!-- SIDEBAR -->
  <div id="sidebar">
    <div id="sidebar-header">
      <div id="sidebar-nav">
        <button id="btn-back">←</button>
        <span id="sidebar-title">Companies</span>
      </div>
      <span id="note-count">0</span>
    </div>
    <div id="note-list"></div>
    <div id="empty-list">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
      </svg>
      <span id="empty-list-msg">No notes yet</span>
    </div>
  </div>

  <!-- EDITOR -->
  <div id="editor-pane">

    <!-- toolbar (hidden until note selected) -->
    <div id="editor-toolbar">
      <span id="save-status">—</span>
      <button id="btn-delete">Delete</button>
    </div>

    <!-- body (hidden until note selected) -->
    <div id="editor-body">
      <input type="text" id="title-input" placeholder="Note title…" spellcheck="false" autocomplete="off" />
      <div id="meta-fields">
        <div class="meta-row">
          <span class="meta-label">Account Manager</span>
          <input id="acct-mgr-input" type="text" class="meta-input" placeholder="—" spellcheck="false" autocomplete="off" />
        </div>
        <div class="meta-row">
          <span class="meta-label">Company Name</span>
          <input id="company-input" type="text" class="meta-input" placeholder="—" spellcheck="false" autocomplete="off" />
        </div>
        <div class="meta-row">
          <span class="meta-label">Last Contacted</span>
          <input id="date-input" type="date" class="meta-input" />
        </div>
        <div class="meta-row">
          <span class="meta-label">Salesforce</span>
          <div class="meta-url-wrap">
            <input id="sf-url-input" type="url" class="meta-input" placeholder="—" spellcheck="false" autocomplete="off" />
            <a id="sf-url-open" href="#" target="_blank" rel="noopener noreferrer" title="Open in new tab">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
                <polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/>
              </svg>
            </a>
          </div>
        </div>
      </div>
      <textarea id="content-input" placeholder="Start writing…" spellcheck="false"></textarea>

      <div id="account-notes-section">
        <div id="account-notes-header">
          <span id="account-notes-label">Account Notes</span>
        </div>
        <textarea id="account-notes-input" placeholder="Notes about this account…" spellcheck="false"></textarea>
      </div>

      <div id="contacts-section">
        <div id="contacts-header">
          <span id="contacts-label">Contacts</span>
          <button id="btn-add-contact">+ Add Contact</button>
        </div>
        <div id="contacts-table">
          <div class="contact-col-heads">
            <span class="contact-col-head">Name</span>
            <span class="contact-col-head">Email</span>
            <span class="contact-col-head">Team</span>
            <span class="contact-col-head">Phone</span>
            <span></span>
          </div>
          <div id="contacts-tbody"></div>
          <div id="contacts-no-company">Set a company name above to manage contacts.</div>
        </div>
      </div>
    </div>

    <!-- empty state -->
    <div id="no-note">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" style="opacity:0.2">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
        <line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/>
        <polyline points="10 9 9 9 8 9"/>
      </svg>
      <span class="label">Select a note</span>
      <span class="hint">or create a new one</span>
    </div>

  </div>
</div>

<!-- DELETE MODAL -->
<div id="modal-overlay">
  <div id="modal">
    <h3>Delete this note?</h3>
    <p>This action is permanent and cannot be undone.</p>
    <div id="modal-actions">
      <button class="btn-cancel" id="modal-cancel">Cancel</button>
      <button class="btn-confirm-delete" id="modal-confirm">Delete</button>
    </div>
  </div>
</div>

<script src="/app.js"></script>
</body>
</html>
