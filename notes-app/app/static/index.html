<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;0,6..72,500;1,6..72,300;1,6..72,400&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d1017;
      --bg2:       #131720;
      --bg3:       #1a2030;
      --border:    #232b3a;
      --text:      #c8c4ba;
      --text-dim:  #5c6270;
      --text-mute: #3a4050;
      --amber:     #c9923a;
      --amber-dim: #8a5f1f;
      --red:       #b84a4a;
      --sidebar-w: 280px;
    }

    html, body { height: 100%; overflow: hidden; }

    body {
      font-family: 'JetBrains Mono', monospace;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
    }

    /* ── TOPBAR ── */
    #topbar {
      height: 46px;
      min-height: 46px;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 18px;
      gap: 14px;
      z-index: 10;
    }

    #topbar .logo {
      font-family: 'Newsreader', serif;
      font-size: 18px;
      font-weight: 400;
      color: var(--amber);
      letter-spacing: 0.01em;
      flex-shrink: 0;
    }

    #topbar .logo span { font-style: italic; }

    #search-wrap {
      flex: 1;
      max-width: 360px;
      position: relative;
    }
    #search {
      width: 100%;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 5px;
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      padding: 6px 10px 6px 30px;
      outline: none;
      transition: border-color 0.15s;
    }
    #search:focus { border-color: var(--amber-dim); }
    #search::placeholder { color: var(--text-mute); }

    #search-dropdown {
      display: none;
      position: absolute;
      top: calc(100% + 6px);
      left: 0;
      right: 0;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 6px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
      z-index: 200;
      max-height: 260px;
      overflow-y: auto;
    }
    #search-dropdown.show { display: block; }
    #search-dropdown::-webkit-scrollbar { width: 4px; }
    #search-dropdown::-webkit-scrollbar-track { background: transparent; }
    #search-dropdown::-webkit-scrollbar-thumb { background: var(--bg3); border-radius: 4px; }
    .dd-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 9px 14px;
      cursor: pointer;
      transition: background 0.1s;
    }
    .dd-item:hover { background: var(--bg3); }
    .dd-item:first-child { border-radius: 6px 6px 0 0; }
    .dd-item:last-child  { border-radius: 0 0 6px 6px; }
    .dd-item:only-child  { border-radius: 6px; }
    .dd-name {
      font-family: 'Newsreader', serif;
      font-size: 14px;
      color: #e0dbd0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .dd-count {
      font-size: 10px;
      color: var(--text-mute);
      flex-shrink: 0;
      margin-left: 10px;
    }
    .dd-empty {
      padding: 10px 14px;
      font-size: 11px;
      color: var(--text-mute);
      font-style: italic;
    }
    #search-wrap svg {
      position: absolute;
      left: 9px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-dim);
    }

    #btn-home {
      background: none;
      border: none;
      color: var(--text-dim);
      cursor: pointer;
      padding: 5px 7px;
      border-radius: 5px;
      display: flex;
      align-items: center;
      flex-shrink: 0;
      transition: color 0.15s, background 0.15s;
    }
    #btn-home:hover { color: var(--amber); background: var(--bg3); }

    #btn-new {
      margin-left: auto;
      background: var(--amber);
      color: #0d1017;
      border: none;
      border-radius: 5px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      padding: 6px 14px;
      cursor: pointer;
      transition: opacity 0.15s;
      flex-shrink: 0;
    }
    #btn-new:hover { opacity: 0.85; }

    /* ── MAIN AREA ── */
    #main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── SIDEBAR ── */
    #sidebar {
      width: var(--sidebar-w);
      min-width: var(--sidebar-w);
      background: var(--bg2);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #sidebar-header {
      padding: 14px 16px 10px;
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-mute);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    #note-count {
      font-size: 10px;
      color: var(--text-mute);
      background: var(--bg3);
      padding: 2px 6px;
      border-radius: 10px;
    }

    #sidebar-nav {
      display: flex;
      align-items: center;
      gap: 6px;
      min-width: 0;
    }
    #sidebar-title {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    #btn-back {
      background: none;
      border: none;
      color: var(--amber);
      font-size: 16px;
      line-height: 1;
      cursor: pointer;
      padding: 0 2px 0 0;
      flex-shrink: 0;
      display: none;
    }
    #btn-back:hover { opacity: 0.7; }

    .company-item {
      padding: 12px 16px;
      cursor: pointer;
      border-left: 2px solid transparent;
      transition: background 0.12s, border-color 0.12s;
      animation: fadeIn 0.18s ease both;
    }
    .company-item:hover { background: var(--bg3); }
    .company-item-name {
      font-family: 'Newsreader', serif;
      font-size: 15px;
      font-weight: 400;
      color: #e0dbd0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 4px;
    }
    .company-item-meta {
      font-size: 10px;
      color: var(--text-mute);
    }

    #note-list {
      flex: 1;
      overflow-y: auto;
      padding: 6px 0;
    }
    #note-list::-webkit-scrollbar { width: 4px; }
    #note-list::-webkit-scrollbar-track { background: transparent; }
    #note-list::-webkit-scrollbar-thumb { background: var(--bg3); border-radius: 4px; }

    .note-item {
      padding: 11px 16px;
      cursor: pointer;
      border-left: 2px solid transparent;
      transition: background 0.12s, border-color 0.12s;
      position: relative;
    }
    .note-item:hover { background: var(--bg3); }
    .note-item.active {
      background: var(--bg3);
      border-left-color: var(--amber);
    }

    .note-item-title {
      font-family: 'Newsreader', serif;
      font-size: 14px;
      font-weight: 400;
      color: #e0dbd0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 4px;
    }
    .note-item.active .note-item-title { color: #f0ebe0; }

    .note-item-meta {
      font-size: 10px;
      color: var(--text-mute);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .note-item-preview {
      font-size: 11px;
      color: var(--text-dim);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 2px;
    }

    #empty-list {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 10px;
      color: var(--text-mute);
      font-size: 12px;
      text-align: center;
      padding: 20px;
    }
    #empty-list svg { opacity: 0.3; }

    /* ── EDITOR ── */
    #editor-pane {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--bg);
    }

    #editor-toolbar {
      height: 44px;
      min-height: 44px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 24px;
      gap: 10px;
    }

    #save-status {
      font-size: 11px;
      color: var(--text-mute);
      margin-left: auto;
      transition: color 0.2s;
    }
    #save-status.saving { color: var(--amber-dim); }
    #save-status.saved  { color: #4a8a5a; }

    #btn-delete {
      background: none;
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text-dim);
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      padding: 4px 10px;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    #btn-delete:hover { border-color: var(--red); color: var(--red); }

    #editor-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 32px 48px 48px;
      gap: 0;
      max-width: 860px;
      width: 100%;
      margin: 0 auto;
    }
    #editor-body::-webkit-scrollbar { width: 4px; }
    #editor-body::-webkit-scrollbar-track { background: transparent; }
    #editor-body::-webkit-scrollbar-thumb { background: var(--bg3); border-radius: 4px; }

    #title-input {
      font-family: 'Newsreader', serif;
      font-size: 32px;
      font-weight: 400;
      color: #f0ebe0;
      background: transparent;
      border: none;
      outline: none;
      width: 100%;
      padding: 0 0 14px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 24px;
      letter-spacing: -0.01em;
      line-height: 1.2;
    }
    #title-input::placeholder { color: var(--text-mute); }

    #content-input {
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      font-weight: 300;
      line-height: 1.8;
      color: var(--text);
      background: transparent;
      border: none;
      outline: none;
      width: 100%;
      resize: none;
      overflow: hidden;
      min-height: 200px;
    }
    #content-input::placeholder { color: var(--text-mute); }
    #content-input::-webkit-scrollbar { width: 4px; }
    #content-input::-webkit-scrollbar-track { background: transparent; }
    #content-input::-webkit-scrollbar-thumb { background: var(--bg3); border-radius: 4px; }

    /* ── META FIELDS ── */
    #meta-fields {
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      gap: 10px;
      padding-bottom: 20px;
      margin-bottom: 20px;
      border-bottom: 1px solid var(--border);
    }
    .meta-row {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .meta-label {
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-dim);
      width: 130px;
      flex-shrink: 0;
    }
    .meta-input {
      flex: 1;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 4px;
      outline: none;
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      padding: 5px 8px;
      transition: border-color 0.15s;
    }
    .meta-input:focus { border-color: var(--amber-dim); }
    .meta-input::placeholder { color: var(--text-dim); }
    .meta-url-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 6px;
      min-width: 0;
    }
    .meta-url-wrap .meta-input { flex: 1; min-width: 0; }
    #sf-url-open {
      flex-shrink: 0;
      color: var(--text-mute);
      display: none;
      align-items: center;
      transition: color 0.15s;
    }
    #sf-url-open.show { display: flex; }
    #sf-url-open:hover { color: var(--amber); }

    input[type="date"].meta-input { color-scheme: dark; }
    input[type="date"].meta-input::-webkit-calendar-picker-indicator {
      filter: invert(0.5);
      cursor: pointer;
    }

    /* ── ACCOUNT NOTES ── */
    #account-notes-section {
      margin-top: 36px;
      margin-bottom: 8px;
    }
    #account-notes-header {
      display: flex;
      align-items: center;
      margin-bottom: 10px;
    }
    #account-notes-label {
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-dim);
    }
    #account-notes-input {
      width: 100%;
      min-height: 120px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      font-weight: 300;
      line-height: 1.7;
      padding: 12px 14px;
      outline: none;
      resize: vertical;
      transition: border-color 0.15s;
    }
    #account-notes-input:focus { border-color: var(--amber-dim); }
    #account-notes-input::placeholder { color: var(--text-mute); }
    #account-notes-input:disabled {
      opacity: 0.35;
      cursor: not-allowed;
      resize: none;
    }
    #account-notes-input::-webkit-scrollbar { width: 4px; }
    #account-notes-input::-webkit-scrollbar-track { background: transparent; }
    #account-notes-input::-webkit-scrollbar-thumb { background: var(--bg3); border-radius: 4px; }

    /* ── CONTACTS ── */
    #contacts-section {
      margin-top: 36px;
      border-top: 1px solid var(--border);
      padding-top: 20px;
    }
    #contacts-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }
    #contacts-label {
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-dim);
    }
    #btn-add-contact {
      background: none;
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text-dim);
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      padding: 3px 10px;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    #btn-add-contact:hover { border-color: var(--amber-dim); color: var(--amber); }
    #contacts-table { width: 100%; }
    .contact-col-heads,
    .contact-row {
      display: grid;
      grid-template-columns: 1fr 1.4fr 0.9fr 1fr 20px;
      gap: 8px;
      align-items: center;
    }
    .contact-col-heads {
      padding: 0 0 6px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 4px;
    }
    .contact-col-head {
      font-size: 9px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-mute);
    }
    .contact-row {
      padding: 3px 0;
      border-radius: 3px;
    }
    .contact-row:hover { background: var(--bg2); }
    .contact-cell-input {
      background: transparent;
      border: none;
      border-bottom: 1px solid transparent;
      outline: none;
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      padding: 4px 2px;
      width: 100%;
      transition: border-color 0.15s;
    }
    .contact-cell-input:focus { border-bottom-color: var(--amber-dim); }
    .contact-cell-input::placeholder { color: var(--text-mute); }
    .btn-del-contact {
      background: none;
      border: none;
      color: transparent;
      font-size: 15px;
      line-height: 1;
      cursor: pointer;
      padding: 0;
      transition: color 0.15s;
    }
    .contact-row:hover .btn-del-contact { color: var(--text-mute); }
    .btn-del-contact:hover { color: var(--red) !important; }
    #contacts-no-company {
      font-size: 11px;
      color: var(--text-mute);
      font-style: italic;
      padding: 10px 2px;
      display: none;
    }

    /* ── EMPTY STATE ── */
    #no-note {
      flex: 1;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      color: var(--text-mute);
    }
    #no-note .label {
      font-family: 'Newsreader', serif;
      font-size: 22px;
      font-style: italic;
      color: var(--text-dim);
    }
    #no-note .hint { font-size: 11px; }

    #editor-toolbar, #editor-body { display: none; }

    /* ── ANIMATIONS ── */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .note-item { animation: fadeIn 0.18s ease both; }

    /* ── MODAL ── */
    #modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    #modal-overlay.show { display: flex; }
    #modal {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 28px 32px;
      width: 340px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      animation: fadeIn 0.15s ease;
    }
    #modal h3 {
      font-family: 'Newsreader', serif;
      font-size: 18px;
      font-weight: 400;
      color: #e0dbd0;
    }
    #modal p { font-size: 12px; color: var(--text-dim); line-height: 1.6; }
    #modal-actions { display: flex; gap: 10px; justify-content: flex-end; }
    .btn-cancel {
      background: none; border: 1px solid var(--border);
      color: var(--text-dim); font-family: 'JetBrains Mono', monospace;
      font-size: 11px; padding: 6px 14px; border-radius: 4px; cursor: pointer;
      transition: border-color 0.15s;
    }
    .btn-cancel:hover { border-color: var(--text-dim); }
    .btn-confirm-delete {
      background: var(--red); border: none; color: #fff;
      font-family: 'JetBrains Mono', monospace; font-size: 11px;
      padding: 6px 14px; border-radius: 4px; cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn-confirm-delete:hover { opacity: 0.85; }
  </style>
</head>
<body>

<!-- TOPBAR -->
<div id="topbar">
  <div class="logo">note<span>s</span></div>
  <button id="btn-home" title="Companies">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
      <polyline points="9 22 9 12 15 12 15 22"/>
    </svg>
  </button>
  <div id="search-wrap">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>
    <input id="search" type="text" placeholder="Search notes…" autocomplete="off" />
    <div id="search-dropdown"></div>
  </div>
  <button id="btn-new">+ New Note</button>
</div>

<!-- MAIN -->
<div id="main">

  <!-- SIDEBAR -->
  <div id="sidebar">
    <div id="sidebar-header">
      <div id="sidebar-nav">
        <button id="btn-back">←</button>
        <span id="sidebar-title">Companies</span>
      </div>
      <span id="note-count">0</span>
    </div>
    <div id="note-list"></div>
    <div id="empty-list">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
      </svg>
      <span id="empty-list-msg">No notes yet</span>
    </div>
  </div>

  <!-- EDITOR -->
  <div id="editor-pane">

    <!-- toolbar (hidden until note selected) -->
    <div id="editor-toolbar">
      <span id="save-status">—</span>
      <button id="btn-delete">Delete</button>
    </div>

    <!-- body (hidden until note selected) -->
    <div id="editor-body">
      <input type="text" id="title-input" placeholder="Note title…" spellcheck="false" autocomplete="off" />
      <div id="meta-fields">
        <div class="meta-row">
          <span class="meta-label">Account Manager</span>
          <input id="acct-mgr-input" type="text" class="meta-input" placeholder="—" spellcheck="false" autocomplete="off" />
        </div>
        <div class="meta-row">
          <span class="meta-label">Company Name</span>
          <input id="company-input" type="text" class="meta-input" placeholder="—" spellcheck="false" autocomplete="off" />
        </div>
        <div class="meta-row">
          <span class="meta-label">Last Contacted</span>
          <input id="date-input" type="date" class="meta-input" />
        </div>
        <div class="meta-row">
          <span class="meta-label">Salesforce</span>
          <div class="meta-url-wrap">
            <input id="sf-url-input" type="url" class="meta-input" placeholder="—" spellcheck="false" autocomplete="off" />
            <a id="sf-url-open" href="#" target="_blank" rel="noopener noreferrer" title="Open in new tab">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
                <polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/>
              </svg>
            </a>
          </div>
        </div>
      </div>
      <textarea id="content-input" placeholder="Start writing…" spellcheck="false"></textarea>

      <div id="account-notes-section">
        <div id="account-notes-header">
          <span id="account-notes-label">Account Notes</span>
        </div>
        <textarea id="account-notes-input" placeholder="Notes about this account…" spellcheck="false"></textarea>
      </div>

      <div id="contacts-section">
        <div id="contacts-header">
          <span id="contacts-label">Contacts</span>
          <button id="btn-add-contact">+ Add Contact</button>
        </div>
        <div id="contacts-table">
          <div class="contact-col-heads">
            <span class="contact-col-head">Name</span>
            <span class="contact-col-head">Email</span>
            <span class="contact-col-head">Team</span>
            <span class="contact-col-head">Phone</span>
            <span></span>
          </div>
          <div id="contacts-tbody"></div>
          <div id="contacts-no-company">Set a company name above to manage contacts.</div>
        </div>
      </div>
    </div>

    <!-- empty state -->
    <div id="no-note">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" style="opacity:0.2">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
        <line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/>
        <polyline points="10 9 9 9 8 9"/>
      </svg>
      <span class="label">Select a note</span>
      <span class="hint">or create a new one</span>
    </div>

  </div>
</div>

<!-- DELETE MODAL -->
<div id="modal-overlay">
  <div id="modal">
    <h3>Delete this note?</h3>
    <p>This action is permanent and cannot be undone.</p>
    <div id="modal-actions">
      <button class="btn-cancel" id="modal-cancel">Cancel</button>
      <button class="btn-confirm-delete" id="modal-confirm">Delete</button>
    </div>
  </div>
</div>

<script>
  const API = '/api/notes';
  let notes = [];
  let companies = [];
  let contacts = [];
  let contactSaveTimers = {};
  let accountNotesSaveTimer;
  let activeId = null;
  let activeCompany = null;
  let view = 'companies'; // 'companies' | 'notes'
  let saveTimer = null;

  // ── DOM refs ──
  const noteList    = document.getElementById('note-list');
  const emptyList   = document.getElementById('empty-list');
  const emptyMsg    = document.getElementById('empty-list-msg');
  const noteCount   = document.getElementById('note-count');
  const editorBar   = document.getElementById('editor-toolbar');
  const editorBody  = document.getElementById('editor-body');
  const noNote      = document.getElementById('no-note');
  const titleInput  = document.getElementById('title-input');
  const contentInput= document.getElementById('content-input');
  const acctMgrInput  = document.getElementById('acct-mgr-input');
  const companyInput  = document.getElementById('company-input');
  const dateInput     = document.getElementById('date-input');
  const sfUrlInput    = document.getElementById('sf-url-input');
  const sfUrlOpen     = document.getElementById('sf-url-open');
  const saveStatus  = document.getElementById('save-status');
  const searchInput = document.getElementById('search');
  const overlay     = document.getElementById('modal-overlay');
  const backBtn     = document.getElementById('btn-back');
  const sidebarTitle = document.getElementById('sidebar-title');

  // ── API helpers ──
  async function apiFetch(url, method = 'GET', body) {
    const res = await fetch(url, {
      method,
      headers: body ? {'Content-Type':'application/json'} : {},
      body: body ? JSON.stringify(body) : undefined
    });
    if (!res.ok) throw new Error(await res.text());
    return res.json();
  }
  async function api(method, path, body) {
    return apiFetch(API + path, method, body);
  }

  // ── Sidebar nav ──
  function updateSidebarHeader() {
    if (view === 'companies') {
      backBtn.style.display = 'none';
      sidebarTitle.textContent = 'Companies';
      searchInput.placeholder = 'Search companies…';
    } else {
      backBtn.style.display = 'inline';
      sidebarTitle.textContent = activeCompany || 'Notes';
      searchInput.placeholder = 'Search notes…';
    }
  }

  function goHome() {
    view = 'companies';
    activeCompany = null;
    searchInput.value = '';
    updateSidebarHeader();
    closeEditor();
    loadCompanies();
  }

  backBtn.onclick = goHome;
  document.getElementById('btn-home').onclick = goHome;

  // ── Companies ──
  async function loadCompanies(q = '') {
    const url = q ? `/api/companies?q=${encodeURIComponent(q)}` : '/api/companies';
    companies = await apiFetch(url);
    renderCompanies();
  }

  function renderCompanies() {
    noteList.innerHTML = '';
    noteCount.textContent = companies.length;
    if (companies.length === 0) {
      emptyList.style.display = 'flex';
      emptyMsg.textContent = searchInput.value ? 'No matches found' : 'No companies yet';
      return;
    }
    emptyList.style.display = 'none';
    companies.forEach((c, i) => {
      const el = document.createElement('div');
      el.className = 'company-item';
      el.style.animationDelay = `${i * 0.03}s`;
      el.innerHTML = `
        <div class="company-item-name">${escHtml(c.company_name)}</div>
        <div class="company-item-meta">${c.note_count} note${c.note_count !== 1 ? 's' : ''} · ${formatDate(c.last_updated)}</div>
      `;
      el.onclick = () => openCompany(c.company_name);
      noteList.appendChild(el);
    });
  }

  async function openCompany(company) {
    view = 'notes';
    activeCompany = company;
    searchInput.value = '';
    updateSidebarHeader();
    await loadNotes();
  }

  // ── Load & render notes ──
  async function loadNotes(q = '') {
    const params = new URLSearchParams();
    if (q) params.set('q', q);
    if (activeCompany !== null) params.set('company', activeCompany);
    const qs = params.toString();
    notes = await api('GET', qs ? `?${qs}` : '');
    renderList();
  }

  function formatDate(iso) {
    const d = new Date(iso);
    const now = new Date();
    const diffMs = now - d;
    const diffMin = Math.floor(diffMs / 60000);
    if (diffMin < 1) return 'just now';
    if (diffMin < 60) return `${diffMin}m ago`;
    const diffH = Math.floor(diffMin / 60);
    if (diffH < 24) return `${diffH}h ago`;
    return d.toLocaleDateString('en-US', {month:'short', day:'numeric'});
  }

  function renderList() {
    noteList.innerHTML = '';
    noteCount.textContent = notes.length;

    if (notes.length === 0) {
      emptyList.style.display = 'flex';
      emptyMsg.textContent = searchInput.value ? 'No matches found' : 'No notes yet';
    } else {
      emptyList.style.display = 'none';
    }

    notes.forEach((n, i) => {
      const el = document.createElement('div');
      el.className = 'note-item' + (n.id === activeId ? ' active' : '');
      el.style.animationDelay = `${i * 0.03}s`;
      const preview = n.content.replace(/\n/g,' ').slice(0, 60);
      el.innerHTML = `
        <div class="note-item-title">${escHtml(n.title || 'Untitled')}</div>
        <div class="note-item-meta">${formatDate(n.updated_at)}</div>
        ${preview ? `<div class="note-item-preview">${escHtml(preview)}</div>` : ''}
      `;
      el.onclick = () => openNote(n.id);
      noteList.appendChild(el);
    });
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ── Open note ──
  function openNote(id) {
    activeId = id;
    const note = notes.find(n => n.id === id);
    if (!note) return;

    editorBar.style.display  = 'flex';
    editorBody.style.display = 'flex';
    noNote.style.display     = 'none';

    titleInput.value   = note.title;
    contentInput.value = note.content;
    acctMgrInput.value = note.account_manager || '';
    companyInput.value = note.company_name || '';
    dateInput.value    = note.date_last_contacted || '';
    sfUrlInput.value   = note.salesforce_url || '';
    updateSfLink();
    setSaveStatus('idle');
    renderList();
    autoResizeContent();
    contentInput.focus();
    contacts = [];
    renderContacts();
    loadContacts(note.company_name || '');
    loadAccountNotes(note.company_name || '');
  }

  function closeEditor() {
    activeId = null;
    contacts = [];
    const an = document.getElementById('account-notes-input');
    an.value = '';
    an.disabled = true;
    editorBar.style.display  = 'none';
    editorBody.style.display = 'none';
    noNote.style.display     = 'flex';
    renderList();
  }

  // ── Account Notes ──
  async function loadAccountNotes(companyName) {
    const input = document.getElementById('account-notes-input');
    if (!companyName) {
      input.value = '';
      input.disabled = true;
      input.placeholder = 'Set a company name above to use account notes.';
      return;
    }
    input.disabled = false;
    input.placeholder = 'Notes about this account…';
    try {
      const data = await apiFetch(`/api/companies/${encodeURIComponent(companyName)}/account-notes`);
      input.value = data.content || '';
    } catch(e) {
      input.value = '';
    }
  }

  document.getElementById('account-notes-input').addEventListener('input', () => {
    clearTimeout(accountNotesSaveTimer);
    accountNotesSaveTimer = setTimeout(async () => {
      const company = companyInput.value.trim();
      if (!company) return;
      try {
        await apiFetch(`/api/companies/${encodeURIComponent(company)}/account-notes`, 'PUT', {
          content: document.getElementById('account-notes-input').value
        });
      } catch(e) {}
    }, 800);
  });

  // ── Contacts ──
  async function loadContacts(companyName) {
    const noCompanyEl = document.getElementById('contacts-no-company');
    const addBtn = document.getElementById('btn-add-contact');
    if (!companyName) {
      contacts = [];
      renderContacts();
      noCompanyEl.style.display = 'block';
      addBtn.disabled = true;
      addBtn.style.opacity = '0.4';
      return;
    }
    noCompanyEl.style.display = 'none';
    addBtn.disabled = false;
    addBtn.style.opacity = '1';
    try {
      contacts = await apiFetch(`/api/companies/${encodeURIComponent(companyName)}/contacts`);
    } catch(e) {
      contacts = [];
    }
    renderContacts();
  }

  function renderContacts() {
    const tbody = document.getElementById('contacts-tbody');
    tbody.innerHTML = '';
    contacts.forEach(c => tbody.appendChild(makeContactRow(c)));
  }

  function makeContactRow(contact) {
    const row = document.createElement('div');
    row.className = 'contact-row';
    const defs = [
      { field: 'name',  placeholder: 'Name',  type: 'text'  },
      { field: 'email', placeholder: 'Email', type: 'email' },
      { field: 'team',  placeholder: 'Team',  type: 'text'  },
      { field: 'phone', placeholder: 'Phone', type: 'tel'   },
    ];
    defs.forEach(({ field, placeholder, type }) => {
      const inp = document.createElement('input');
      inp.type = type;
      inp.className = 'contact-cell-input';
      inp.value = contact[field] || '';
      inp.placeholder = placeholder;
      inp.spellcheck = false;
      inp.autocomplete = 'off';
      inp.addEventListener('input', () => {
        contact[field] = inp.value;
        clearTimeout(contactSaveTimers[contact.id]);
        contactSaveTimers[contact.id] = setTimeout(() => saveContact(contact), 600);
      });
      row.appendChild(inp);
    });
    const del = document.createElement('button');
    del.className = 'btn-del-contact';
    del.textContent = '×';
    del.title = 'Remove contact';
    del.onclick = async () => {
      await apiFetch(`/api/contacts/${contact.id}`, 'DELETE');
      contacts = contacts.filter(c => c.id !== contact.id);
      row.remove();
    };
    row.appendChild(del);
    return row;
  }

  async function saveContact(contact) {
    try {
      await apiFetch(`/api/contacts/${contact.id}`, 'PUT', {
        name: contact.name, email: contact.email,
        team: contact.team, phone: contact.phone
      });
    } catch(e) {}
  }

  document.getElementById('btn-add-contact').onclick = async () => {
    const company = companyInput.value.trim();
    if (!company) return;
    const contact = await apiFetch(`/api/companies/${encodeURIComponent(company)}/contacts`, 'POST', {
      name: '', email: '', team: '', phone: ''
    });
    contacts.push(contact);
    const row = makeContactRow(contact);
    document.getElementById('contacts-tbody').appendChild(row);
    row.querySelector('input').focus();
  };

  // ── Save status ──
  function setSaveStatus(state, msg) {
    saveStatus.className = '';
    if (state === 'saving') {
      saveStatus.className = 'saving';
      saveStatus.textContent = 'saving…';
    } else if (state === 'saved') {
      saveStatus.className = 'saved';
      saveStatus.textContent = '✓ saved';
      setTimeout(() => { if (saveStatus.className === 'saved') setSaveStatus('idle'); }, 2000);
    } else {
      saveStatus.textContent = msg || '—';
    }
  }

  // ── Auto-save ──
  function scheduleSave() {
    setSaveStatus('saving');
    clearTimeout(saveTimer);
    saveTimer = setTimeout(saveActive, 800);
  }

  async function saveActive() {
    if (!activeId) return;
    try {
      const updated = await api('PUT', `/${activeId}`, {
        title: titleInput.value || 'Untitled',
        content: contentInput.value,
        account_manager: acctMgrInput.value,
        company_name: companyInput.value,
        date_last_contacted: dateInput.value,
        salesforce_url: sfUrlInput.value
      });
      // update local cache
      const idx = notes.findIndex(n => n.id === activeId);
      if (idx !== -1) notes[idx] = updated;
      setSaveStatus('saved');
      renderList();
    } catch(e) {
      setSaveStatus('idle', '⚠ save failed');
    }
  }

  // ── Auto-resize ──
  function autoResizeContent() {
    contentInput.style.height = 'auto';
    contentInput.style.height = contentInput.scrollHeight + 'px';
  }

  titleInput.addEventListener('input', scheduleSave);
  contentInput.addEventListener('input', () => { autoResizeContent(); scheduleSave(); });
  function updateSfLink() {
    const url = sfUrlInput.value.trim();
    if (url) {
      sfUrlOpen.href = /^https?:\/\//i.test(url) ? url : 'https://' + url;
      sfUrlOpen.classList.add('show');
    } else {
      sfUrlOpen.href = '#';
      sfUrlOpen.classList.remove('show');
    }
  }

  sfUrlInput.addEventListener('input', () => { updateSfLink(); scheduleSave(); });
  acctMgrInput.addEventListener('input', scheduleSave);
  let contactCompanyTimer;
  companyInput.addEventListener('input', () => {
    scheduleSave();
    clearTimeout(contactCompanyTimer);
    contactCompanyTimer = setTimeout(() => {
      const c = companyInput.value.trim();
      loadContacts(c);
      loadAccountNotes(c);
    }, 1000);
  });
  dateInput.addEventListener('change', scheduleSave);

  // ── New note ──
  document.getElementById('btn-new').onclick = async () => {
    const payload = { title: 'Untitled', content: '' };
    if (view === 'notes' && activeCompany) payload.company_name = activeCompany;
    const note = await api('POST', '', payload);
    if (view === 'companies') {
      // Stay in companies view — editor opens, user fills in company
      notes = [note];
    } else {
      notes.unshift(note);
      renderList();
    }
    openNote(note.id);
    titleInput.select();
  };

  // ── Search + company dropdown ──
  const searchDropdown = document.getElementById('search-dropdown');
  let searchTimer;
  let dropdownTimer;

  async function refreshDropdown(q) {
    try {
      const url = q ? `/api/companies?q=${encodeURIComponent(q)}` : '/api/companies';
      const cos = await apiFetch(url);
      searchDropdown.innerHTML = '';
      if (cos.length === 0) {
        searchDropdown.innerHTML = '<div class="dd-empty">No companies found</div>';
      } else {
        cos.forEach(c => {
          const item = document.createElement('div');
          item.className = 'dd-item';
          item.innerHTML = `<span class="dd-name">${escHtml(c.company_name)}</span>
            <span class="dd-count">${c.note_count} note${c.note_count !== 1 ? 's' : ''}</span>`;
          item.onmousedown = e => {
            e.preventDefault();
            searchInput.value = '';
            searchDropdown.classList.remove('show');
            openCompany(c.company_name);
          };
          searchDropdown.appendChild(item);
        });
      }
      searchDropdown.classList.add('show');
    } catch(e) {}
  }

  searchInput.addEventListener('focus', () => { if (view === 'companies') refreshDropdown(searchInput.value.trim()); });
  searchInput.addEventListener('blur',  () => setTimeout(() => searchDropdown.classList.remove('show'), 150));
  searchInput.addEventListener('input', () => {
    clearTimeout(searchTimer);
    clearTimeout(dropdownTimer);
    const q = searchInput.value.trim();
    searchTimer   = setTimeout(() => { if (view === 'companies') loadCompanies(q); else loadNotes(q); }, 200);
    if (view === 'companies') dropdownTimer = setTimeout(() => refreshDropdown(q), 150);
  });

  // ── Delete ──
  document.getElementById('btn-delete').onclick = () => overlay.classList.add('show');
  document.getElementById('modal-cancel').onclick = () => overlay.classList.remove('show');
  document.getElementById('modal-confirm').onclick = async () => {
    overlay.classList.remove('show');
    if (!activeId) return;
    await api('DELETE', `/${activeId}`);
    notes = notes.filter(n => n.id !== activeId);
    closeEditor();
  };
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.classList.remove('show'); });

  // ── Keyboard shortcuts ──
  document.addEventListener('keydown', e => {
    if ((e.metaKey || e.ctrlKey) && e.key === 'n') {
      e.preventDefault();
      document.getElementById('btn-new').click();
    }
    if ((e.metaKey || e.ctrlKey) && e.key === 'f') {
      e.preventDefault();
      searchInput.focus();
      searchInput.select();
    }
    if (e.key === 'Escape') overlay.classList.remove('show');
  });

  // ── Init ──
  updateSidebarHeader();
  loadCompanies();
  noNote.style.display = 'flex';
</script>
</body>
</html>
